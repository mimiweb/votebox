<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 패널 - 투표박스</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg); }

    /* 로그인 화면 */
    #login-section {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      padding: 1rem;
    }

    /* 대시보드 화면 */
    #dashboard-section { display: none; }

    .admin-header-bar {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      color: white;
      padding: 0.875rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .admin-header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .admin-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.1rem;
      font-weight: 800;
      color: white;
      text-decoration: none;
    }

    .admin-logo-badge {
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .admin-header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .admin-user-badge {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
    }

    .btn-logout {
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.35rem 0.875rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .admin-content { padding: 1.5rem 0 3rem; }

    .admin-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0;
    }

    .admin-tab-btn {
      padding: 0.6rem 1.1rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-family: var(--font);
    }
    .admin-tab-btn:hover { color: var(--primary); }
    .admin-tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .admin-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 320px;
    }

    .search-wrap input {
      padding-left: 2.2rem;
    }

    .search-icon {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .table-responsive { overflow-x: auto; }

    /* Login Error */
    #login-error {
      display: none;
      background: #fee2e2;
      color: #991b1b;
      border-radius: 6px;
      padding: 0.6rem 0.875rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    /* Login Decoration */
    .login-decoration {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .login-icon-wrap {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 24px rgba(99,102,241,0.3);
    }
  </style>
</head>
<body>

  <!-- ==========================================
       로그인 섹션
       ========================================== -->
  <div id="login-section">
    <div class="login-card">
      <div class="login-decoration">
        <div class="login-icon-wrap">📊</div>
      </div>
      <h1 class="login-title">관리자 로그인</h1>
      <p class="login-subtitle">투표박스 관리자 패널에 접속합니다</p>

      <div id="login-error">비밀번호가 올바르지 않습니다.</div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="login-password">관리자 비밀번호</label>
          <input
            type="password"
            id="login-password"
            class="form-control"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
          🔐 로그인
        </button>
      </form>

      <div style="margin-top:1.25rem;text-align:center">
        <a href="index.html" style="font-size:0.82rem;color:var(--text-muted)">← 일반 사이트로 돌아가기</a>
      </div>

      <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);font-size:0.75rem;color:var(--text-muted);text-align:center">
        ⚠️ 이 페이지는 관리자 전용입니다.<br>일반 사용자는 이 URL을 알아도 로그인이 불가합니다.
      </div>
    </div>
  </div>

  <!-- ==========================================
       대시보드 섹션
       ========================================== -->
  <div id="dashboard-section">

    <!-- Admin Header -->
    <div class="admin-header-bar">
      <div class="container">
        <div class="admin-header-inner">
          <a href="admin.html" class="admin-logo">
            <span>📊</span>
            투표박스
            <span class="admin-logo-badge">ADMIN</span>
          </a>
          <div class="admin-header-right">
            <span class="admin-user-badge">👤 관리자</span>
            <button class="btn-logout" id="btn-logout">로그아웃</button>
            <a href="index.html" target="_blank" style="font-size:0.82rem;color:rgba(255,255,255,0.7);text-decoration:none">
              사이트 보기 ↗
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Dashboard Content -->
    <div class="admin-content">
      <div class="container">

        <!-- 통계 카드 -->
        <div class="admin-stats" style="margin-bottom:1.5rem">
          <div class="stat-card">
            <div class="stat-number" id="stat-posts">0</div>
            <div class="stat-label">활성 게시글</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" style="color:var(--danger)" id="stat-deleted">0</div>
            <div class="stat-label">삭제된 게시글</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" style="color:var(--success)" id="stat-votes">0</div>
            <div class="stat-label">누적 투표 수</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" style="color:#f59e0b" id="stat-comments">0</div>
            <div class="stat-label">활성 댓글</div>
          </div>
        </div>

        <!-- 탭 -->
        <div class="admin-tabs">
          <button class="admin-tab-btn active" id="tab-posts">📋 게시글 관리</button>
          <button class="admin-tab-btn" id="tab-comments">💬 댓글 관리</button>
        </div>

        <!-- 검색 툴바 -->
        <div class="admin-toolbar">
          <div class="search-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="form-control" id="search-input" placeholder="검색...">
          </div>
          <div style="font-size:0.82rem;color:var(--text-muted)">
            삭제된 항목은 회색으로 표시됩니다
          </div>
        </div>

        <!-- 게시글 테이블 -->
        <div id="posts-section">
          <div class="admin-table-wrap">
            <div class="table-responsive">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>제목</th>
                    <th style="text-align:center">투표수</th>
                    <th style="text-align:center">좋아요</th>
                    <th style="text-align:center">댓글</th>
                    <th>작성일</th>
                    <th>관리</th>
                  </tr>
                </thead>
                <tbody id="posts-tbody">
                  <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted)">로딩 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- 댓글 테이블 -->
        <div id="comments-section" style="display:none">
          <div class="admin-table-wrap">
            <div class="table-responsive">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>게시글</th>
                    <th>작성자</th>
                    <th>내용</th>
                    <th>작성일</th>
                    <th>관리</th>
                  </tr>
                </thead>
                <tbody id="comments-tbody">
                  <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted)">로딩 중...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
